name: Scan n8n node

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx @n8n/scan-community-package n8n-nodes-api-indonesia
        continue-on-error: true
      - run: npx @n8n/scan-community-package n8n-nodes-api-indonesia 2>&1 | tee scan-output.txt
        continue-on-error: true
      - name: Upload scan output
        uses: actions/upload-artifact@v4
        with:
          name: scan-output
          path: scan-output.txt
